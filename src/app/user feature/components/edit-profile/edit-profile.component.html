<div class="edit-profile-container py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8 col-md-10">
        
        <!-- Back Navigation link -->
        <div class="mb-4">
          <a routerLink="/dashboard" class="back-link d-inline-flex align-items-center gap-2">
            <span class="material-symbols-outlined">arrow_back</span>
            Back to Dashboard
          </a>
        </div>

        <!-- Main Form Card -->
        <div class="card edit-profile-card shadow-sm border-0 rounded-4 overflow-hidden card-glow">
          <div class="card-header-accent p-4">
            <h3 class="m-0 text-white fw-bold">Edit Profile</h3>
            <p class="m-0 text-white-50 font-xs">Update your personal details and custom avatar</p>
          </div>

          <!-- Loading Skeleton -->
          <div class="p-4" *ngIf="isLoading() && !profile()">
            <div class="skeleton skeleton-avatar mx-auto mb-4"></div>
            <div class="skeleton skeleton-row mb-3" *ngFor="let i of [1, 2, 3]"></div>
          </div>

          <!-- Form Content -->
          <form (submit)="onSubmit($event)" class="p-4 p-md-5" *ngIf="profile() && !isLoading()">
            
            <!-- Avatar Upload Section -->
            <div class="avatar-upload-group text-center mb-5">
              <div class="avatar-preview-container mx-auto">
                <img [src]="imagePreview() || 'assets/default-avatar.png'" alt="Avatar Preview" class="avatar-preview" onerror="this.src='https://api.dicebear.com/7.x/adventurer/svg?seed=handora'"/>
                <label for="profileImageInput" class="btn-change-avatar" title="Upload new photo">
                  <span class="material-symbols-outlined">photo_camera</span>
                </label>
              </div>
              <input type="file" id="profileImageInput" accept="image/*" class="d-none" (change)="onFileSelected($event)" />
              <div class="upload-hint mt-2 text-muted">
                Allowed formats: JPG, PNG. Max size: 2MB.
              </div>
            </div>

            <!-- Form Fields -->
            <div class="row g-4">
              <!-- Name Input -->
              <div class="col-12">
                <div class="form-group-custom">
                  <label for="fullNameInput" class="form-label-custom">
                    <span class="material-symbols-outlined font-sm">person</span>
                    Full Name
                  </label>
                  <input type="text" id="fullNameInput" class="form-control-custom" [value]="name()" (input)="name.set($any($event.target).value)" placeholder="Enter your full name" required />
                </div>
              </div>

              <!-- Phone Input -->
              <div class="col-12">
                <div class="form-group-custom">
                  <label for="phoneInput" class="form-label-custom">
                    <span class="material-symbols-outlined font-sm">phone</span>
                    Phone Number
                  </label>
                  <input type="tel" id="phoneInput" class="form-control-custom" [value]="phoneNumber()" (input)="phoneNumber.set($any($event.target).value)" placeholder="Enter your phone number (optional)" />
                </div>
              </div>

              <!-- Bio TextArea -->
              <div class="col-12">
                <div class="form-group-custom">
                  <label for="bioInput" class="form-label-custom">
                    <span class="material-symbols-outlined font-sm">rate_review</span>
                    Bio / Short description
                  </label>
                  <textarea id="bioInput" rows="4" class="form-control-custom" [value]="bio()" (input)="bio.set($any($event.target).value)" placeholder="Tell us about yourself, your passion for crafts, or what you look for in artisans..."></textarea>
                </div>
              </div>
            </div>

            <!-- Actions Bar -->
            <div class="actions-row mt-5 pt-4 d-flex justify-content-end gap-3 border-top">
              <a routerLink="/dashboard" class="btn btn-outline-custom">
                Cancel
              </a>
              <button type="submit" class="btn btn-submit-custom" [disabled]="isSaving()">
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true" *ngIf="isSaving()"></span>
                {{ isSaving() ? 'Saving Changes...' : 'Save Changes' }}
              </button>
            </div>

          </form>

        </div>

      </div>
    </div>
  </div>
</div>
