<div class="container-fluid p-0">

  <!--  Hero Section  -->
  <div class="text-white text-center py-5"
    style="background: linear-gradient(135deg, #2c1810, #8B4513);">
    <div class="container py-3">
      <h1 class="display-4 fw-bold mb-3">🧶 {{ langService.translate('welcomeToHandora') }}</h1>
      <p class="fs-5 mb-4 text-white-50">
        {{ langService.translate('discoverUniqueProducts') }}
      </p>
      <a routerLink="/products" class="btn btn-light btn-lg fw-bold px-5">
        {{ langService.translate('shopNow') }}
      </a>
    </div>
  </div>

  <div class="container mt-5">

    <!-- Clock Section  -->
    <div class="text-center mb-5">
      <button class="btn btn-outline-dark mb-3"
        (click)="showClock = !showClock">
        {{ showClock ? langService.translate('hideClock') : langService.translate('showClock') }}
      </button>

      @if (showClock) {
        <app-clock></app-clock>
      }
    </div>

    <hr class="mb-5" />

    <!--  Search Section — Parent Input  -->
    <div class="row justify-content-center mb-2">
      <div class="col-md-6">
        <h5 class="fw-bold text-center mb-3">{{ langService.translate('searchProducts') }}</h5>
        <input
          type="text"
          class="form-control form-control-lg shadow-sm"
          [placeholder]="langService.translate('searchPlaceholder')"
          [(ngModel)]="searchTerm"
        />
        @if (searchTerm) {
          <small class="text-muted ms-1">
            {{ langService.translate('showingResultsFor') }}: <strong>{{ searchTerm }}</strong>
          </small>
        }
      </div>
    </div>

    <!-- Products List — Child  -->
    <app-products [parentSearch]="searchTerm"></app-products>

  </div>

</div>
