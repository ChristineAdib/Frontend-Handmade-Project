<div class="auth-container">

  <div class="narrative-panel">
    <div class="narrative-bg"></div>
    <div class="narrative-overlay"></div>
    <div class="narrative-content">
      <h1 class="panel-main-title">Handora:<br>Crafted Connections.<br>Handmade Mastery.</h1>
      <p class="panel-sub-title">Join our community of creators and collectors.</p>
    </div>
  </div>

  <div class="form-panel">
    <div class="form-wrapper animate-fade">

      @if (auth.errorMsg()) {
        <div class="error-banner">
          <span>{{ auth.errorMsg() }}</span>
        </div>
      }

      @switch (auth.activeTab()) {
        @case ('login')    { <app-login/>    }
        @case ('register') { <app-register/> }
        @case ('otp')      { <app-otp/>      }
      }

    </div>
  </div>

</div>
