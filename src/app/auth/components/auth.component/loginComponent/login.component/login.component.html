<div class="compact-layout-narrow">
  <div class="form-header-main">
    <h2>{{ langService.translate('welcomeBackTitle') }}</h2>
    <p class="form-subheading">{{ langService.translate('welcomeBackSanctuary') }}</p>
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="form-fields-stack">
    <div class="exact-input-group">
      <label>{{ langService.translate('emailAddress') }}</label>
      <input type="email" formControlName="email" placeholder="name@example.com"
             [ngClass]="{'input-error': loginForm.get('email')?.touched && loginForm.get('email')?.invalid}">
    </div>

    <div class="exact-input-group">
      <label>{{ langService.translate('passwordLabel') }}</label>
      <div class="password-wrapper-custom">
        <input [type]="showPass() ? 'text' : 'password'" formControlName="password" placeholder="••••••••">
        <button type="button" class="exact-eye-btn" (click)="togglePass()">
          {{ showPass() ? '👁️' : '🔒' }}
        </button>
      </div>
    </div>

    <div class="exact-utilities-zone">
      <label class="remember-me-custom">
        <input type="checkbox">
        <span>{{ langService.translate('rememberMe') }}</span>
      </label>
      <a class="forgot-link-custom">{{ langService.translate('forgotPassword') }}</a>
    </div>

    <button type="submit" [disabled]="loginForm.invalid || isLoading()" class="btn-submit-main">
      @if (isLoading()) { <span class="spinner-custom"></span> } @else { {{ langService.translate('signIn') }} }
    </button>
  </form>

  <p class="switch-tab-text">
    {{ langService.translate('newToHandora') }}
    <button type="button" (click)="auth.activeTab.set('register')">{{ langService.translate('createAccount') }}</button>
  </p>
</div>
