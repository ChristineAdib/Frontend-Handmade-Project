<div class="compact-layout-narrow">
  <div class="form-header-main">
    <h2>Verify Your Email.</h2>
    <p class="form-subheading">
      We sent a 6-digit code to <strong>{{ auth.otpEmail() }}</strong>
    </p>
  </div>

  <form [formGroup]="otpForm" (ngSubmit)="onVerifyOtp()" class="form-fields-stack">
    <div class="exact-input-group">
      <label>OTP Code</label>
      <input type="text" formControlName="otp" placeholder="Enter 6-digit code"
             maxlength="6"
             [ngClass]="{'input-error': otpForm.get('otp')?.touched && otpForm.get('otp')?.invalid}">
    </div>

    <button type="submit" [disabled]="otpForm.invalid || isLoading()" class="btn-submit-main">
      @if (isLoading()) { <span class="spinner-custom"></span> } @else { Verify }
    </button>
  </form>

  <p class="switch-tab-text">
    @if (canResend()) {
      <button type="button" (click)="onResendOtp()">Resend Code</button>
    } @else {
      Resend code in <strong>{{ otpTimer() }}s</strong>
    }
  </p>
</div>
