<div class="compact-layout-narrow">
  <div class="form-header-main">
    <h2>{{ langService.translate('verifyEmailTitle') }}</h2>
    <p class="form-subheading">
      {{ langService.translate('codeSentMsg') }} <strong>{{ auth.otpEmail() }}</strong>
    </p>
  </div>

  <form [formGroup]="otpForm" (ngSubmit)="onVerifyOtp()" class="form-fields-stack">
    <div class="exact-input-group">
      <label>{{ langService.translate('otpCodeLabel') }}</label>
      <input type="text" formControlName="otp" [placeholder]="langService.translate('otpPlaceholder')"
             maxlength="6"
             [ngClass]="{'input-error': otpForm.get('otp')?.touched && otpForm.get('otp')?.invalid}">
    </div>

    <button type="submit" [disabled]="otpForm.invalid || isLoading()" class="btn-submit-main">
      @if (isLoading()) { <span class="spinner-custom"></span> } @else { {{ langService.translate('verifyBtn') }} }
    </button>
  </form>

  <p class="switch-tab-text">
    @if (canResend()) {
      <button type="button" (click)="onResendOtp()">{{ langService.translate('resendCode') }}</button>
    } @else {
      {{ langService.translate('resendCodeIn') }} <strong>{{ formattedTimer() }}</strong>
    }
  </p>
</div>
