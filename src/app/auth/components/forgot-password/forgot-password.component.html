<div class="auth-container" [dir]="langService.currentLang() === 'ar' ? 'rtl' : 'ltr'">
  <div class="narrative-panel">
    <div class="narrative-bg"></div>
    <div class="narrative-overlay"></div>
    <div class="narrative-content">
      <h1 class="panel-main-title" [innerHTML]="langService.translate('craftedConnections')"></h1>
      <p class="panel-sub-title">{{ langService.translate('creatorsCollectors') }}</p>
    </div>
  </div>

  <div class="form-panel">
    <div class="form-wrapper animate-fade">
      <div class="compact-layout-narrow">
        <div class="form-header-main">
          <h2>{{ langService.translate('forgotPasswordTitle') }}</h2>
          <p class="form-subheading">{{ langService.translate('forgotPasswordInstructions') }}</p>
        </div>

        @if (errorMsg()) {
          <div class="error-banner">
            <span>{{ errorMsg() }}</span>
          </div>
        }

        @if (successMsg()) {
          <div class="success-banner">
            <span>{{ successMsg() }}</span>
          </div>
        } @else {
          <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="form-fields-stack">
            <div class="exact-input-group">
              <label>{{ langService.translate('emailAddress') }}</label>
              <input type="email" formControlName="email" placeholder="name@example.com"
                     [ngClass]="{'input-error': forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid}">
            </div>

            <button type="submit" [disabled]="forgotForm.invalid || isLoading()" class="btn-submit-main">
              @if (isLoading()) { <span class="spinner-custom"></span> } @else { {{ langService.translate('sendResetLink') }} }
            </button>
          </form>
        }

        <p class="switch-tab-text">
          <button type="button" routerLink="/login">{{ langService.translate('backToLogin') }}</button>
        </p>
      </div>
    </div>
  </div>
</div>
