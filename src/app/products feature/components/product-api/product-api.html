<!-- Loading -->
<div *ngIf="isLoading" class="text-center mt-5">
  <div class="spinner-border text-primary"></div>
  <p class="mt-2">Loading products...</p>
</div>

<!-- Error -->
<div *ngIf="errorMessage" class="alert alert-danger m-3">
  {{ errorMessage }}
</div>

<!-- Products -->
<div *ngIf="!isLoading && !errorMessage" class="container mt-4">
  <h2 class="mb-4">Products ({{ products.length }})</h2>
  <div class="row g-4">
    <div class="col-lg-3 col-md-4 col-sm-6" *ngFor="let product of products">
      <div class="card h-100 shadow-sm">
        <img
          [src]="product.mainImageUrl"
          class="card-img-top"
          style="height: 200px; object-fit: cover;"
          [alt]="product.titleEn"
        >
        <div class="card-body">
          <span class="badge bg-secondary mb-2">{{ product.categoryNameEn }}</span>
          <h6 class="card-title">{{ product.titleEn }}</h6>
          <p class="card-text text-muted small">{{ product.titleAr }}</p>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center">
          <strong class="text-success">${{ product.price }}</strong>
          <button class="btn btn-sm btn-primary">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>
</div>
