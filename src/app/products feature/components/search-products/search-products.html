<div class="container mt-5">

  <!-- Title -->
  <h2 class="mb-4" style="color: #1a0a00;">Search Products</h2>

  <!-- Search Bar -->
  <form [formGroup]="searchForm" (ngSubmit)="search()">
    <div class="input-group mb-4 shadow-sm">
      <input
        type="text"
        class="form-control form-control-lg"
        placeholder="Search by product name..."
        formControlName="title"
      >
      <button
        class="btn btn-lg px-4"
        style="background-color: #c8813a; color: white;"
        type="submit"
        [disabled]="isLoading"
      >
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
        Search
      </button>
    </div>
  </form>

  <!-- Loading -->
  <div *ngIf="isLoading" class="text-center mt-5">
    <div class="spinner-border" style="color: #c8813a;"></div>
    <p class="mt-2 text-muted">Searching...</p>
  </div>

  <!-- Error -->
  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <!-- No Results -->
  <div *ngIf="hasSearched && !isLoading && products.length === 0 && !errorMessage"
    class="text-center mt-5">
    <p class="text-muted fs-5">No products found 😕</p>
  </div>

  <!-- Results Count -->
  <p *ngIf="products.length > 0" class="text-muted mb-3">
    Found <strong>{{ products.length }}</strong> products
  </p>

  <!-- Cards -->
  <div class="row g-4">
    <div class="col-lg-3 col-md-4 col-sm-6"
      *ngFor="let product of products">
      <div class="card h-100 shadow-sm border-0"
        style="border-radius: 12px; overflow: hidden;">

        <!-- Image -->
        <img
          [src]="product.mainImageUrl"
          class="card-img-top"
          style="height: 200px; object-fit: cover;"
          [alt]="product.titleEn"
        >

        <div class="card-body d-flex flex-column">

          <!-- Category Badge -->
          <span class="badge mb-2 align-self-start"
            style="background-color: #1a0a00; color: #e8c9a0;">
            {{ product.categoryNameEn }}
          </span>

          <!-- Title -->
          <h6 class="card-title fw-bold">{{ product.titleEn }}</h6>

          <!-- Price -->
          <p class="mt-auto mb-0 fw-bold fs-5"
            style="color: #c8813a;">
            ${{ product.price }}
          </p>

        </div>
      </div>
    </div>
  </div>

</div>
