<nav class="navbar navbar-expand-lg" style="background-color: #1a0a00;">
  <div class="container">

    <!-- Brand -->
    <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/home">
      <div style="width:38px; height:38px; background:#c8813a; border-radius:50%;
                  display:flex; align-items:center; justify-content:center;
                  color:white; font-weight:500; font-size:16px;">H</div>
      <span style="color:white; font-size:18px; font-weight:500; letter-spacing:0.5px;">
        Handoura
      </span>
    </a>

    <!-- Toggler for mobile -->
    <button class="navbar-toggler border-0" type="button"
      data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Links -->
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-1">

        <li class="nav-item">
          <a class="nav-link px-3 py-2 rounded-3" style="color: #e8c9a0;"
            routerLink="/home" routerLinkActive="active-nav">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link px-3 py-2 rounded-3" style="color: #e8c9a0;"
            routerLink="/products-api" routerLinkActive="active-nav">ProductsAPI</a>
        </li>

        <li class="nav-item">
          <a class="nav-link px-3 py-2 rounded-3" style="color: #e8c9a0;"
            routerLink="/products" routerLinkActive="active-nav">Products</a>
        </li>

        <li class="nav-item">
          <a class="nav-link px-3 py-2 rounded-3" style="color: #e8c9a0;"
            routerLink="/about" routerLinkActive="active-nav">About</a>
        </li>

        <li class="nav-item">
          <a class="nav-link px-3 py-2 rounded-3" style="color: #e8c9a0;"
            routerLink="/contact" routerLinkActive="active-nav">Contact</a>
        </li>

        <li class="nav-item">
          <a class="nav-link px-3 py-2 rounded-3" style="color: #e8c9a0;"
            routerLink="/search-products" routerLinkActive="active-nav">
            Search
          </a>
        </li>

        <!-- ===== لو مش logged in ===== -->
        @if (!isLoggedIn()) {
          <li class="nav-item">
            <a class="nav-link px-3 py-2 rounded-3" style="color: #e8c9a0;"
              routerLink="/register" routerLinkActive="active-nav">Register</a>
          </li>
          <li class="nav-item">
            <a class="nav-link px-3 py-2 rounded-3" style="color: #e8c9a0;"
              routerLink="/login-api" routerLinkActive="active-nav">Login</a>
          </li>
        }

        <!-- ===== لو logged in ===== -->
        @if (isLoggedIn()) {
          <li class="nav-item">
            <a class="nav-link px-3 py-2 rounded-3" style="color: #e8c9a0;"
              routerLink="/cart" routerLinkActive="active-nav">🛒 Cart</a>
          </li>
          <li class="nav-item">
            <a class="nav-link px-3 py-2 rounded-3" style="color: #e8c9a0;"
              routerLink="/orders" routerLinkActive="active-nav">Orders</a>
          </li>
          <li class="nav-item">
            <a class="nav-link px-3 py-2 rounded-3" style="color: #e8c9a0;"
              routerLink="/profile" routerLinkActive="active-nav">Profile</a>
          </li>
          <li class="nav-item">
            <button class="btn btn-sm px-3 py-2 rounded-3"
              style="background-color: #c8813a; color: white; border: none;"
              (click)="logout()">
              Logout
            </button>
          </li>
        }

      </ul>
    </div>

  </div>
</nav>
