<!-- subscribe.component.html -->
<section class="subscribe-section">
  <div class="subscribe-container">
    <div class="subscribe-image">
      <img 
        src="https://images.unsplash.com/photo-1527383214149-cb7be04ae387?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
        alt="Handmade woven rattan bag with natural materials"
        loading="lazy"
      />
      <div class="image-overlay"></div>
    </div>

    <div class="subscribe-content">
      <div class="content-wrapper">
        <span class="subscribe-label">JOIN OUR MAILING LIST</span>
        
        <h2 class="subscribe-title">
          Get $20 discount for<br />your first order
        </h2>

        <div class="subscribe-form" [class.success]="isSubmitted">
          <input 
            type="email" 
            [(ngModel)]="email"
            placeholder="Your email address..."
            class="email-input"
            (keyup.enter)="onSubscribe()"
            [disabled]="isLoading"
          />
          <button 
            class="subscribe-btn" 
            (click)="onSubscribe()"
            [disabled]="!email || isLoading"
            [class.loading]="isLoading"
            [class.success]="isSubmitted"
          >
            <span class="btn-text" *ngIf="!isLoading && !isSubmitted">SUBSCRIBE</span>
            <span class="btn-text" *ngIf="isLoading">SENDING...</span>
            <span class="btn-text" *ngIf="isSubmitted">SUBSCRIBED!</span>
            
            <svg class="btn-icon arrow" *ngIf="!isLoading && !isSubmitted" width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M3 9H15M15 9L10 4M15 9L10 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            
            <svg class="btn-icon check" *ngIf="isSubmitted" width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M3 9L8 14L15 4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>

            <svg class="btn-icon spinner" *ngIf="isLoading" width="18" height="18" viewBox="0 0 18 18">
              <circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="2" fill="none" stroke-dasharray="20 40" stroke-linecap="round">
                <animateTransform attributeName="transform" type="rotate" from="0 9 9" to="360 9 9" dur="1s" repeatCount="indefinite"/>
              </circle>
            </svg>
          </button>
        </div>

        <p class="subscribe-disclaimer" *ngIf="!isSubmitted">
          *Online only. First-time subscribers only
        </p>

        <div class="success-message" *ngIf="isSubmitted">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 0C4.477 0 0 4.477 0 10s4.477 10 10 10 10-4.477 10-10S15.523 0 10 0z" fill="rgba(255,255,255,0.2)"/>
            <path d="M6 10L9 13L14 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Thank you! Check your inbox for your $20 discount code.</span>
        </div>
      </div>

      <div class="bamboo-decoration">
        <svg viewBox="0 0 200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M160 0V400" stroke="rgba(255,255,255,0.06)" stroke-width="8"/>
          <path d="M180 50V400" stroke="rgba(255,255,255,0.04)" stroke-width="6"/>
          <path d="M140 100V400" stroke="rgba(255,255,255,0.03)" stroke-width="5"/>
          <path d="M156 80H164" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
          <path d="M156 160H164" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
          <path d="M156 240H164" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
          <path d="M156 320H164" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
          <path d="M160 120 Q180 100 190 80 Q170 90 160 120" fill="rgba(255,255,255,0.04)"/>
          <path d="M160 200 Q140 180 130 160 Q150 170 160 200" fill="rgba(255,255,255,0.03)"/>
          <path d="M160 280 Q180 260 195 240 Q175 250 160 280" fill="rgba(255,255,255,0.04)"/>
          <path d="M140 150 Q120 130 110 110 Q130 120 140 150" fill="rgba(255,255,255,0.02)"/>
          <path d="M180 220 Q200 200 210 180 Q190 190 180 220" fill="rgba(255,255,255,0.03)"/>
        </svg>
      </div>

      <div class="texture-overlay"></div>
    </div>
  </div>
</section>
